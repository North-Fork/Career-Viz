<script src="data/cv-data-enriched.js"></script>
<script>
// ═══════════════════════════════════════════════════════════════
// STRANDS — same conceptual groupings as helix and arc
// ═══════════════════════════════════════════════════════════════

const STRANDS = [
  {
    id: 'territory', label: 'Territory & Sovereignty', color: '#f5a623',
    spreadR: 195,  // cluster radius
    themes: new Set(['Indigenous futures','Indigenous digital sovereignty',
      'Aboriginal territories in cyberspace','Language revitalization',
      'Settler colonialism and technology','Indigenous methodologies','Indigenous pedagogy']),
    groups: new Set(['Policy Papers','Keynotes','Service']),
  },
  {
    id: 'making', label: 'Making & Practice', color: '#38bdf8',
    spreadR: 145,
    themes: new Set(['New media art','Computational media','Interactive installation',
      'Cultural technology','Research-creation','Curatorial practice','Game design']),
    groups: new Set(['Creative Works','Group Exhibitions','Solo Exhibitions',
      'Commissions','Residencies','Curatorial','Productions','Film Screenings']),
  },
  {
    id: 'word', label: 'The Living Word', color: '#c084fc',
    spreadR: 130,
    themes: new Set(['Electronic literature','Computational poetry','Digital storytelling',
      'Generative media','Creative coding','Mobile media','Sound and music','AI and creativity']),
    groups: new Set(['Poetry',"Artist's Books",'Websites','Invited Publications']),
  },
  {
    id: 'infrastructure', label: 'Building Infrastructure', color: '#fb7185',
    spreadR: 72,
    themes: new Set(['Digital infrastructure','Community engagement','Collaboration and co-creation']),
    groups: new Set(['Employment','Funding (PI)','Funding (Co-I)',
      'Symposia Organized','Residency Organizer','Books/Chapters','Journal Articles','Honors']),
  },
];

const STRAND_MAP = Object.fromEntries(STRANDS.map(s => [s.id, s]));

function assignStrand(entry) {
  const themes = entry.themes || [], group = entry.group || '';
  let best = STRANDS[0], bestScore = -1;
  for (const s of STRANDS) {
    let score = themes.filter(t => s.themes.has(t)).length * 2;
    if (s.groups.has(group)) score += 1.5;
    if (score > bestScore) { bestScore = score; best = s; }
  }
  return best;
}

// ═══════════════════════════════════════════════════════════════
// CONSTANTS
// ═══════════════════════════════════════════════════════════════

const YEAR_MIN = 1985;
const YEAR_MAX = 2026;
const GROW_INTERVAL = 380; // ms per year step
const CURSOR_EDDY_R = 100;
const CONSTELLATION_R = 62;
const HEAVY = new Set(['Books/Chapters','Journal Articles','Keynotes',
  'Solo Exhibitions','Creative Works','Honors','Funding (PI)']);

function parseYear(s) {
  if (!s) return null;
  const parts = String(s).split('/');
  if (parts.length === 3) { const y = parseInt(parts[2]); return isNaN(y) ? null : y; }
  const m = String(s).match(/\b(19|20)\d{2}\b/);
  return m ? parseInt(m[0]) : null;
}

// ═══════════════════════════════════════════════════════════════
// CANVAS
// ═══════════════════════════════════════════════════════════════

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H, dpr;

function resize() {
  dpr = window.devicePixelRatio || 1;
  const wrap = canvas.parentElement;
  W = wrap.clientWidth;
  H = wrap.clientHeight;
  canvas.width  = Math.round(W * dpr);
  canvas.height = Math.round(H * dpr);
  canvas.style.width  = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}

// ═══════════════════════════════════════════════════════════════
// ATTRACTORS — placement gives Territory dominance at center,
// with Making/Word/Infrastructure orbiting it
// ═══════════════════════════════════════════════════════════════

function attractorPos(id) {
  switch (id) {
    case 'territory':     return { x: W * 0.42, y: H * 0.45 };
    case 'making':        return { x: W * 0.73, y: H * 0.30 };
    case 'word':          return { x: W * 0.70, y: H * 0.68 };
    case 'infrastructure':return { x: W * 0.22, y: H * 0.68 };
  }
}

// ═══════════════════════════════════════════════════════════════
// PARTICLES
// ═══════════════════════════════════════════════════════════════

class Particle {
  constructor(entry, idx) {
    this.entry  = entry;
    this.idx    = idx;
    this.strand = assignStrand(entry);
    this.year   = parseYear(entry['start date']) || 2000;
    this.radius = HEAVY.has(entry.group) ? 3.2 : 1.8;

    // Start near attractor center
    const a = attractorPos(this.strand.id);
    this.x  = a.x + (Math.random() - 0.5) * 40;
    this.y  = a.y + (Math.random() - 0.5) * 40;
    this.vx = (Math.random() - 0.5) * 0.4;
    this.vy = (Math.random() - 0.5) * 0.4;

    // Home position — the particle's resting place within the cluster
    this.assignHome();

    this.birthAge  = -1;   // -1 = not yet born; 0+ = frames since birth
    this.visible   = false;
  }

  assignHome() {
    const a = attractorPos(this.strand.id);
    const r = this.strand.spreadR;
    // Gaussian-ish spread: average of 3 uniforms
    const gx = ((Math.random() + Math.random() + Math.random()) / 3 - 0.5) * 2;
    const gy = ((Math.random() + Math.random() + Math.random()) / 3 - 0.5) * 2;
    this.homeX = a.x + gx * r;
    this.homeY = a.y + gy * r;
  }

  birth() {
    if (this.visible) return;
    this.visible  = true;
    this.birthAge = 0;
    // Snap to near attractor to fly out from center
    const a = attractorPos(this.strand.id);
    this.x = a.x + (Math.random() - 0.5) * 30;
    this.y = a.y + (Math.random() - 0.5) * 30;
    this.vx = (Math.random() - 0.5) * 1.5;
    this.vy = (Math.random() - 0.5) * 1.5;
  }

  update(mx, my) {
    if (!this.visible) return;

    if (this.birthAge >= 0) this.birthAge++;

    // Spring toward home
    this.vx += (this.homeX - this.x) * 0.0022;
    this.vy += (this.homeY - this.y) * 0.0022;

    // Wander — continuous gentle drift
    this.vx += (Math.random() - 0.5) * 0.055;
    this.vy += (Math.random() - 0.5) * 0.055;

    // Cursor eddy — tangential swirl, not repulsion.
    // Force is perpendicular to the cursor→particle direction,
    // so particles orbit gently rather than flee.
    const dx = this.x - mx, dy = this.y - my;
    const dist2 = dx * dx + dy * dy;
    if (dist2 < CURSOR_EDDY_R * CURSOR_EDDY_R && dist2 > 0.01) {
      const dist = Math.sqrt(dist2);
      const t    = (1 - dist / CURSOR_EDDY_R);   // falloff: 1 at center, 0 at edge
      // Tangential: perpendicular to (dx,dy) → creates swirl
      this.vx += (-dy / dist) * t * 0.28;
      this.vy += ( dx / dist) * t * 0.28;
      // Tiny radial nudge so cursor doesn't create a singularity at dist=0
      this.vx += (dx / dist) * t * 0.04;
      this.vy += (dy / dist) * t * 0.04;
    }

    // Damping
    this.vx *= 0.955;
    this.vy *= 0.955;

    this.x += this.vx;
    this.y += this.vy;
  }

  draw(ctx, isHovered) {
    if (!this.visible) return;

    const depth  = 0.5;
    const flash  = this.birthAge >= 0 && this.birthAge < 45
      ? 1 - this.birthAge / 45
      : 0;
    const alpha = isHovered ? 1.0 : (0.25 + depth * 0.5);
    const r = this.radius * (1 + flash * 1.8);

    // Birth flash halo
    if (flash > 0) {
      const hr = r * (3 + flash * 4);
      const g  = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, hr);
      g.addColorStop(0, `rgba(255,255,255,${flash * 0.7})`);
      g.addColorStop(1, 'rgba(255,255,255,0)');
      ctx.beginPath();
      ctx.arc(this.x, this.y, hr, 0, Math.PI * 2);
      ctx.fillStyle = g;
      ctx.fill();
    }

    // Glow halo for hovered or heavy
    if (isHovered || this.radius > 2.5) {
      const gr = r * (isHovered ? 5 : 3.5);
      const g  = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, gr);
      g.addColorStop(0, this.strand.color + (isHovered ? '55' : '30'));
      g.addColorStop(1, this.strand.color + '00');
      ctx.beginPath();
      ctx.arc(this.x, this.y, gr, 0, Math.PI * 2);
      ctx.fillStyle = g;
      ctx.globalAlpha = isHovered ? 1 : 0.7;
      ctx.fill();
      ctx.globalAlpha = 1;
    }

    // Core dot — mix toward white during flash
    const flashColor = flash > 0
      ? lerpColor(this.strand.color, '#ffffff', flash * 0.75)
      : this.strand.color;
    ctx.beginPath();
    ctx.arc(this.x, this.y, r, 0, Math.PI * 2);
    ctx.fillStyle = flashColor;
    ctx.globalAlpha = Math.min(alpha + flash * 0.5, 1);
    ctx.fill();
    ctx.globalAlpha = 1;

    // Hover ring
    if (isHovered) {
      ctx.beginPath();
      ctx.arc(this.x, this.y, r + 4, 0, Math.PI * 2);
      ctx.strokeStyle = this.strand.color;
      ctx.lineWidth = 1;
      ctx.globalAlpha = 0.6;
      ctx.stroke();
      ctx.globalAlpha = 1;
    }
  }
}

function lerpColor(hex1, hex2, t) {
  const r1 = parseInt(hex1.slice(1,3),16), g1 = parseInt(hex1.slice(3,5),16), b1 = parseInt(hex1.slice(5,7),16);
  const r2 = parseInt(hex2.slice(1,3),16), g2 = parseInt(hex2.slice(3,5),16), b2 = parseInt(hex2.slice(5,7),16);
  const r  = Math.round(r1 + (r2-r1)*t);
  const g  = Math.round(g1 + (g2-g1)*t);
  const b  = Math.round(b1 + (b2-b1)*t);
  return `rgb(${r},${g},${b})`;
}

// ═══════════════════════════════════════════════════════════════
// CONSTELLATION LINES — connect nearby same-strand particles
// ═══════════════════════════════════════════════════════════════

let lineCache  = [];
let lineTimer  = 0;

function buildLines(particles) {
  // Spatial grid for O(n) neighbor lookup
  const cellSize = CONSTELLATION_R;
  const grid = new Map();
  for (const p of particles) {
    if (!p.visible) continue;
    const cx = Math.floor(p.x / cellSize);
    const cy = Math.floor(p.y / cellSize);
    const k  = cx + ',' + cy;
    if (!grid.has(k)) grid.set(k, []);
    grid.get(k).push(p);
  }

  const lines = [];
  const seen  = new Set();
  for (const p of particles) {
    if (!p.visible) continue;
    const cx = Math.floor(p.x / cellSize);
    const cy = Math.floor(p.y / cellSize);
    for (let dx = -1; dx <= 1; dx++) {
      for (let dy = -1; dy <= 1; dy++) {
        const neighbors = grid.get((cx+dx) + ',' + (cy+dy)) || [];
        for (const q of neighbors) {
          if (q === p || q.strand.id !== p.strand.id) continue;
          const key = p.idx < q.idx ? p.idx + '-' + q.idx : q.idx + '-' + p.idx;
          if (seen.has(key)) continue;
          const dist = Math.hypot(p.x - q.x, p.y - q.y);
          if (dist < CONSTELLATION_R) {
            lines.push({ p, q, dist });
            seen.add(key);
          }
        }
      }
    }
  }
  return lines;
}

function drawLines(lines, hoveredStrand) {
  for (const { p, q, dist } of lines) {
    const isActive = hoveredStrand === null || p.strand.id === hoveredStrand;
    const alpha    = isActive
      ? (1 - dist / CONSTELLATION_R) * 0.14
      : 0.02;
    ctx.beginPath();
    ctx.moveTo(p.x, p.y);
    ctx.lineTo(q.x, q.y);
    ctx.strokeStyle = p.strand.color;
    ctx.lineWidth   = 0.55;
    ctx.globalAlpha = alpha;
    ctx.stroke();
  }
  ctx.globalAlpha = 1;
}

// ═══════════════════════════════════════════════════════════════
// CLUSTER LABELS
// ═══════════════════════════════════════════════════════════════

function drawLabels(particles, hoveredStrand) {
  for (const strand of STRANDS) {
    const pts = particles.filter(p => p.visible && p.strand.id === strand.id);
    if (pts.length < 3) continue;

    // Label at attractor position
    const a     = attractorPos(strand.id);
    const isHov = hoveredStrand === strand.id;
    const alpha = isHov ? 0.82 : 0.22;

    ctx.font      = `${isHov ? 600 : 400} ${isHov ? 11 : 10}px -apple-system, system-ui, sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillStyle = strand.color;
    ctx.globalAlpha = alpha;

    // Slight glow on hover
    if (isHov) ctx.filter = 'blur(0px)';
    ctx.fillText(strand.label.toUpperCase(), a.x, a.y - strand.spreadR * 0.7 - 10);
    ctx.globalAlpha = 1;
    ctx.filter = 'none';

    // Entry count
    ctx.font      = '9px -apple-system, system-ui, sans-serif';
    ctx.fillStyle = strand.color;
    ctx.globalAlpha = isHov ? 0.5 : 0.1;
    ctx.fillText(`${pts.length} works`, a.x, a.y - strand.spreadR * 0.7 + 6);
    ctx.globalAlpha = 1;
  }
}

// ═══════════════════════════════════════════════════════════════
// HEADER
// ═══════════════════════════════════════════════════════════════

function drawHeader() {
  ctx.textAlign = 'left';
  ctx.font      = 'bold 11px -apple-system, system-ui, sans-serif';
  ctx.fillStyle = 'rgba(215,228,255,0.78)';
  ctx.fillText('CAREER STARS', 24, 30);
  ctx.font      = '10px -apple-system, system-ui, sans-serif';
  ctx.fillStyle = 'rgba(215,228,255,0.25)';
  ctx.fillText('Jason E. Lewis  ·  1985 – 2026', 24, 46);
  ctx.fillStyle = 'rgba(215,228,255,0.14)';
  ctx.fillText('Each star is one work. Each cluster is a recurring concern.', 24, 62);
}

// ═══════════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════════

let particles    = [];
let currentYear  = YEAR_MAX;
let mouseX       = -999, mouseY = -999;
let hoveredP     = null;
let hoveredStrand = null;
let growInterval  = null;
let growHead      = YEAR_MIN;
let frameCount    = 0;

// ═══════════════════════════════════════════════════════════════
// FRAME
// ═══════════════════════════════════════════════════════════════

function frame() {
  frameCount++;

  // Rebuild constellation lines every 25 frames
  if (frameCount % 25 === 0) {
    lineCache = buildLines(particles.filter(p => p.visible));
  }

  // Update physics
  for (const p of particles) {
    if (p.visible) p.update(mouseX, mouseY);
  }

  // Trail fade
  ctx.fillStyle = 'rgba(6,11,24,0.13)';
  ctx.fillRect(0, 0, W, H);

  // Constellation lines
  drawLines(lineCache, hoveredStrand);

  // Find hovered particle (nearest within 22px)
  let nearest = null, nearestD = 22 * 22;
  for (const p of particles) {
    if (!p.visible) continue;
    const d = (p.x - mouseX) ** 2 + (p.y - mouseY) ** 2;
    if (d < nearestD) { nearestD = d; nearest = p; }
  }
  if (nearest !== hoveredP) {
    hoveredP      = nearest;
    hoveredStrand = nearest ? nearest.strand.id : null;
    updateInfo(nearest);
  }

  // Particles (sorted by radius so big ones render on top)
  const sorted = particles.filter(p => p.visible).sort((a,b) => a.radius - b.radius);
  for (const p of sorted) p.draw(ctx, p === hoveredP);

  // Cluster labels
  drawLabels(particles, hoveredStrand);

  // Header (redrawn sharp over trails)
  drawHeader();

  requestAnimationFrame(frame);
}

// ═══════════════════════════════════════════════════════════════
// YEAR FILTER
// ═══════════════════════════════════════════════════════════════

function setYear(yr) {
  currentYear = yr;
  document.getElementById('year-label').textContent = yr;
  document.getElementById('year-slider').value = yr;

  for (const p of particles) {
    if (!p.visible && p.year <= yr) p.birth();
    else if (p.visible && p.year > yr) {
      p.visible  = false;
      p.birthAge = -1;
    }
  }
}

// ═══════════════════════════════════════════════════════════════
// INFO PANEL
// ═══════════════════════════════════════════════════════════════

function updateInfo(p) {
  const el = document.getElementById('info-content');
  if (!p) {
    el.innerHTML = `<p class="info-hint">
      Each star is one work.<br>
      Each cluster is a<br>
      recurring concern.<br><br>
      Move the cursor through<br>
      the field. Press Grow<br>
      to watch the career form.
    </p>`;
    return;
  }
  const hl = (p.entry.headline || '').replace(/<[^>]+>/g,'').trim();
  el.innerHTML = `
    <div class="info-strand" style="color:${p.strand.color}">${esc(p.strand.label)}</div>
    <div class="info-headline">${esc(hl.length > 110 ? hl.slice(0,108)+'…' : hl)}</div>
    <div class="info-meta">
      ${p.year}${p.entry.group ? ' &nbsp;·&nbsp; '+esc(p.entry.group) : ''}
      ${p.entry.org ? '<br>'+esc(p.entry.org) : ''}
    </div>
  `;
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ═══════════════════════════════════════════════════════════════
// CONTROLS
// ═══════════════════════════════════════════════════════════════

document.getElementById('year-slider').addEventListener('input', function() {
  if (growInterval) stopGrow();
  setYear(parseInt(this.value));
});

const btnGrow = document.getElementById('btn-grow');
btnGrow.addEventListener('click', () => {
  if (growInterval) { stopGrow(); return; }

  // Reset to beginning
  setYear(YEAR_MIN - 1);
  growHead = YEAR_MIN;
  btnGrow.textContent = '■ Stop';
  btnGrow.classList.add('active');

  growInterval = setInterval(() => {
    setYear(growHead);
    growHead++;
    if (growHead > YEAR_MAX) {
      stopGrow();
      setYear(YEAR_MAX);
    }
  }, GROW_INTERVAL);
});

function stopGrow() {
  clearInterval(growInterval);
  growInterval = null;
  btnGrow.textContent = '▶ Grow';
  btnGrow.classList.remove('active');
}

canvas.addEventListener('mousemove', e => {
  const r = canvas.getBoundingClientRect();
  mouseX = e.clientX - r.left;
  mouseY = e.clientY - r.top;
});
canvas.addEventListener('mouseleave', () => {
  mouseX = -999; mouseY = -999;
});

// ═══════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════

function init() {
  resize();

  const raw = window.__TIMELINE_DATA__ || [];
  particles = raw.map((entry, i) => new Particle(entry, i));

  // Show all entries up to currentYear immediately on load
  setYear(YEAR_MAX);

  // Initial constellation lines
  lineCache = buildLines(particles.filter(p => p.visible));

  requestAnimationFrame(frame);
}

window.addEventListener('resize', () => {
  resize();
  // Recompute home positions for new canvas dimensions
  for (const p of particles) p.assignHome();
});

if (typeof window.__TIMELINE_DATA__ !== 'undefined') {
  init();
} else {
  resize();
  ctx.fillStyle = 'rgba(215,228,255,0.4)';
  ctx.font      = '13px system-ui';
  ctx.textAlign = 'center';
  ctx.fillText('Data not loaded — serve from Coding-Experiments/ with python3 -m http.server 8001', W/2, H/2);
}
</script>
</body>
